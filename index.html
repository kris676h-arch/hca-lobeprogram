<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HCA 30km">
<meta name="theme-color" content="#0f0f0d">
<title>HCA 30km 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0d;
  --surface: #1a1a16;
  --surface2: #222219;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede6;
  --muted: #7a7870;
  --accent: #c8f07a;
  --accent-dim: rgba(200,240,122,0.12);
  --accent-text: #0f0f0d;
  --build-color: #fbbf24;
  --build-dim: rgba(251,191,36,0.12);
  --peak-color: #fb7185;
  --peak-dim: rgba(251,113,133,0.12);
  --taper-color: #f0b46a;
  --taper-dim: rgba(240,180,106,0.12);
  --race-color: #a78bfa;
  --race-dim: rgba(167,139,250,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; font-size:13px; min-height:100vh; padding-bottom:80px; }
#app { max-width:600px; margin:0 auto; }

.hero { padding:28px 20px 16px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:10; }
.hero-sub { font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.hero-title { font-family:'Fraunces',serif; font-size:28px; font-weight:300; letter-spacing:-0.5px; line-height:1.1; color:var(--text); margin-bottom:16px; }
.hero-title em { font-style:italic; color:var(--accent); }
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
.stat-label { font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
.stat-val { font-size:16px; font-weight:500; color:var(--text); }
.stat-val.accent { color:var(--accent); }
.prog-bg { height:3px; background:var(--surface2); border-radius:2px; }
.prog-fill { height:3px; background:var(--accent); border-radius:2px; transition:width 0.4s; }
.prog-meta { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-top:5px; }

.phase-group { margin:20px 12px 0; }
.phase-label { font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); padding:0 4px; margin-bottom:8px; }
.week-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:8px; overflow:hidden; }
.week-header { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; cursor:pointer; user-select:none; }
.week-header:active { background:var(--surface2); }
.week-name { font-size:12px; font-weight:500; color:var(--text); }
.week-meta { font-size:10px; color:var(--muted); margin-top:2px; }
.week-right { display:flex; align-items:center; gap:8px; }
.badge { font-size:9px; letter-spacing:0.06em; text-transform:uppercase; padding:3px 8px; border-radius:20px; font-weight:500; }
.badge-base { background:var(--accent-dim); color:var(--accent); }
.badge-build { background:var(--build-dim); color:var(--build-color); }
.badge-peak { background:var(--peak-dim); color:var(--peak-color); }
.badge-taper { background:var(--taper-dim); color:var(--taper-color); }
.badge-race { background:var(--race-dim); color:var(--race-color); }
.chevron { color:var(--muted); font-size:12px; transition:transform 0.2s; display:inline-block; }
.chevron.open { transform:rotate(180deg); }
.mini-bar { height:2px; background:var(--surface2); }
.mini-fill { height:2px; background:var(--accent); transition:width 0.3s; }
.week-body { display:none; border-top:1px solid var(--border); }
.week-body.open { display:block; }

.day-row { border-bottom:1px solid var(--border); }
.day-row:last-child { border-bottom:none; }
.day-main { display:flex; align-items:center; padding:11px 14px; gap:12px; transition:background 0.15s; }
.day-row.clickable .day-main { cursor:pointer; }
.day-row.clickable .day-main:active { background:var(--surface2); }
.day-row.done .day-main { background:rgba(200,240,122,0.04); }
.check { width:22px; height:22px; border-radius:50%; border:1.5px solid var(--border2); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; }
.day-row.done .check { background:var(--accent); border-color:var(--accent); }
.day-row.race-day .check { border-color:var(--race-color); }
.day-row.race-day.done .check { background:var(--race-color); border-color:var(--race-color); }
.check svg { display:none; }
.day-row.done .check svg { display:block; }
.day-info { flex:1; min-width:0; }
.day-name { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; }
.day-desc { font-size:12px; color:var(--text); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.day-row.done .day-desc { color:var(--muted); text-decoration:line-through; }
.day-rest .day-desc { color:var(--muted); font-style:italic; }
.day-race .day-desc { color:var(--race-color); }
.day-km { font-size:11px; color:var(--muted); flex-shrink:0; }

/* PHOTO */
.photo-area { padding:0 14px 12px 48px; }
.photo-thumb { position:relative; display:block; margin-top:4px; }
.photo-thumb img { width:100%; max-width:280px; border-radius:8px; border:1px solid var(--border2); display:block; cursor:pointer; }
.photo-delete { position:absolute; top:6px; right:calc(100% - 280px - 6px); background:rgba(15,15,13,0.8); border:1px solid var(--border2); border-radius:50%; width:26px; height:26px; color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
@media (max-width:380px) { .photo-delete { right:6px; } }
.photo-note { margin-top:8px; width:100%; max-width:280px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 10px; color:var(--text); font-family:'DM Mono',monospace; font-size:11px; resize:none; outline:none; line-height:1.5; display:block; }
.photo-note::placeholder { color:var(--muted); }
.photo-note:focus { border-color:var(--border2); }
.add-photo-btn { display:inline-flex; align-items:center; gap:6px; margin-top:4px; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); background:none; border:1px dashed var(--border2); border-radius:6px; padding:5px 10px; cursor:pointer; letter-spacing:0.03em; }
.add-photo-btn:active { background:var(--surface2); }
.file-input { display:none; }

/* LIGHTBOX */
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.93); z-index:200; align-items:center; justify-content:center; }
.lightbox.show { display:flex; }
.lightbox img { max-width:95vw; max-height:90vh; border-radius:8px; object-fit:contain; }
.lb-close { position:absolute; top:16px; right:20px; background:none; border:none; color:var(--text); font-size:32px; cursor:pointer; line-height:1; opacity:0.8; }

.bottom-bar { position:fixed; bottom:0; left:0; right:0; background:var(--bg); border-top:1px solid var(--border); padding:10px 20px 20px; display:flex; justify-content:space-between; align-items:center; }
.bottom-tip { font-size:10px; color:var(--muted); max-width:200px; line-height:1.4; }
.reset-btn { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); background:none; border:1px solid var(--border); border-radius:6px; padding:6px 12px; cursor:pointer; }
.reset-btn:active { background:var(--surface2); }

.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:flex-end; justify-content:center; }
.overlay.show { display:flex; }
.sheet { background:var(--surface); border:1px solid var(--border2); border-radius:16px 16px 0 0; padding:24px 20px 40px; width:100%; max-width:600px; }
.sheet p { color:var(--text); font-size:14px; margin-bottom:16px; line-height:1.5; }
.sheet-btns { display:flex; gap:10px; }
.sheet-btns button { flex:1; font-family:'DM Mono',monospace; font-size:12px; padding:12px; border-radius:10px; cursor:pointer; border:none; }
.btn-cancel { background:var(--surface2); color:var(--muted); }
.btn-confirm { background:#fb7185; color:#0f0f0d; font-weight:500; }
</style>
</head>
<body>
<div id="app">
  <div class="hero">
    <p class="hero-sub">HCA 30 km · 27. september 2026</p>
    <h1 class="hero-title">Løb på <em>2:45</em></h1>
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Mål pace</div><div class="stat-val accent">5:30</div></div>
      <div class="stat"><div class="stat-label">Fuldført</div><div class="stat-val" id="done-count">0 / 0</div></div>
      <div class="stat"><div class="stat-label">Dage til løb</div><div class="stat-val" id="days-left">—</div></div>
    </div>
    <div class="prog-bg"><div class="prog-fill" id="main-prog" style="width:0%"></div></div>
    <div class="prog-meta"><span id="prog-pct">0% gennemført</span><span>27. sep 2026</span></div>
  </div>
  <div id="program"></div>
  <div class="bottom-bar">
    <div class="bottom-tip">Tryk på en dag for at markere den fuldført</div>
    <button class="reset-btn" onclick="showReset()">Nulstil alt</button>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">×</button>
  <img id="lb-img" src="" alt="">
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <p>Vil du nulstille al din fremgang og alle billeder? Det kan ikke fortrydes.</p>
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="hideReset()">Annuller</button>
      <button class="btn-confirm" onclick="doReset()">Nulstil</button>
    </div>
  </div>
</div>

<script>
const PHASES = [
  { label:"Fase 1 — Basisopbygning", badge:"badge-base", badgeText:"Base", weeks:[
    { label:"Uge 1 · 21–27 apr", sub:"Kom i gang · ca. 28 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","7 km"],["Ons","Hvile eller gåtur",""],["Tor","Rolig løbetur","6 km"],["Fre","Hvile",""],["Lør","Rolig langtur","10 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 2 · 28 apr–4 maj", sub:"Opbyg vane · ca. 32 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","8 km"],["Ons","Hvile eller yoga",""],["Tor","Fartleg 5×1 min hurtig/rolig","7 km"],["Fre","Hvile",""],["Lør","Langtur rolig","12 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 3 · 5–11 maj", sub:"Rutine · ca. 35 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","8 km"],["Ons","Hvile",""],["Tor","Tempotur i 5:15 pace","7 km"],["Fre","Hvile",""],["Lør","Langtur","14 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 4 · 12–18 maj — HVILEUGE", sub:"Restitution · ca. 25 km", days:[["Man","Hvile",""],["Tir","Let løbetur","6 km"],["Ons","Hvile",""],["Tor","Rolig løbetur","6 km"],["Fre","Hvile",""],["Lør","Let langtur","10 km"],["Søn","Hvile",""]] },
  ]},
  { label:"Fase 2 — Opbygning", badge:"badge-build", badgeText:"Opbyg", weeks:[
    { label:"Uge 5 · 19–25 maj", sub:"Intro intervaller · ca. 38 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","9 km"],["Ons","Hvile",""],["Tor","Intervaller: 4×1 km i 5:00–5:10","8 km"],["Fre","Hvile",""],["Lør","Langtur","16 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 6 · 26 maj–1 jun", sub:"Øg langtur · ca. 42 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","10 km"],["Ons","Hvile",""],["Tor","Tempotur: 4 km i måltempo 5:30","9 km"],["Fre","Hvile",""],["Lør","Langtur","18 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 7 · 2–8 jun", sub:"Hårdere uge · ca. 45 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","10 km"],["Ons","Hvile",""],["Tor","Intervaller: 5×1 km i 5:10–5:20","9 km"],["Fre","Hvile",""],["Lør","Langtur","18 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 8 · 9–15 jun — HVILEUGE", sub:"Restitution · ca. 30 km", days:[["Man","Hvile",""],["Tir","Let løbetur","7 km"],["Ons","Hvile",""],["Tor","Rolig løbetur","7 km"],["Fre","Hvile",""],["Lør","Let langtur","12 km"],["Søn","Hvile",""]] },
  ]},
  { label:"Fase 3 — Intensitet", badge:"badge-peak", badgeText:"Peak", weeks:[
    { label:"Uge 9 · 16–22 jun", sub:"Tempo fokus · ca. 46 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","11 km"],["Ons","Hvile",""],["Tor","Tempotur: 6 km i 5:20–5:30","10 km"],["Fre","Hvile",""],["Lør","Langtur","20 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 10 · 23–29 jun", sub:"Maks volumen · ca. 50 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","12 km"],["Ons","Hvile",""],["Tor","Intervaller: 6×1 km race pace","10 km"],["Fre","Hvile",""],["Lør","Langtur — vigtig!","22 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 11 · 30 jun–6 jul", sub:"Stærk uge · ca. 50 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","12 km"],["Ons","Hvile",""],["Tor","Tempotur: 7 km race pace","11 km"],["Fre","Hvile",""],["Lør","Langtur","22 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 12 · 7–13 jul — HVILEUGE", sub:"Restitution · ca. 32 km", days:[["Man","Hvile",""],["Tir","Let løbetur","8 km"],["Ons","Hvile",""],["Tor","Rolig løbetur","8 km"],["Fre","Hvile",""],["Lør","Let langtur","12 km"],["Søn","Hvile",""]] },
  ]},
  { label:"Fase 4 — Topform", badge:"badge-peak", badgeText:"Peak", weeks:[
    { label:"Uge 13 · 14–20 jul", sub:"Hård uge · ca. 52 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","12 km"],["Ons","Hvile",""],["Tor","Intervaller: 3×3 km race pace","11 km"],["Fre","Hvile",""],["Lør","Langtur — maks!","24 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 14 · 21–27 jul", sub:"Vedligehold · ca. 48 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","11 km"],["Ons","Hvile",""],["Tor","Tempotur: 10 km race pace","12 km"],["Fre","Hvile",""],["Lør","Langtur","22 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 15 · 28 jul–3 aug", sub:"Afsluttende peak · ca. 50 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","11 km"],["Ons","Hvile",""],["Tor","Intervaller: 4×2 km race pace","11 km"],["Fre","Hvile",""],["Lør","Langtur 22–24 km rolig","22 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 16 · 4–10 aug — HVILEUGE", sub:"Restitution · ca. 32 km", days:[["Man","Hvile",""],["Tir","Let løbetur","8 km"],["Ons","Hvile",""],["Tor","Rolig løbetur","8 km"],["Fre","Hvile",""],["Lør","Let langtur","12 km"],["Søn","Hvile",""]] },
  ]},
  { label:"Fase 5 — Nedtrapning (Taper)", badge:"badge-taper", badgeText:"Taper", weeks:[
    { label:"Uge 17 · 11–17 aug", sub:"Første taper · ca. 40 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","10 km"],["Ons","Hvile",""],["Tor","Tempotur: 6 km race pace","9 km"],["Fre","Hvile",""],["Lør","Langtur, rolig","16 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 18 · 18–24 aug", sub:"Reducer volumen · ca. 34 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","9 km"],["Ons","Hvile",""],["Tor","Interval: 3×2 km race pace","8 km"],["Fre","Hvile",""],["Lør","Kortere langtur","14 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 19 · 25–31 aug", sub:"Let volumen · ca. 28 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","7 km"],["Ons","Hvile",""],["Tor","Let tempotur: 5 km","7 km"],["Fre","Hvile",""],["Lør","Let langtur","12 km"],["Søn","Aktiv hvile",""]] },
    { label:"Uge 20 · 1–7 sep", sub:"Taper · ca. 22 km", days:[["Man","Hvile",""],["Tir","Rolig løbetur","6 km"],["Ons","Hvile",""],["Tor","4 km i race pace","6 km"],["Fre","Hvile",""],["Lør","Let langtur","8 km"],["Søn","Aktiv hvile",""]] },
  ]},
  { label:"Fase 6 — Raceuge", badge:"badge-race", badgeText:"Race", weeks:[
    { label:"Uge 21 · 8–14 sep", sub:"Meget let uge · ca. 20 km", days:[["Man","Hvile",""],["Tir","Let løbetur","6 km"],["Ons","Hvile",""],["Tor","Let løbetur + 4×100m strides","6 km"],["Fre","Hvile",""],["Lør","Meget let joggetur","6 km"],["Søn","Hvile",""]] },
    { label:"Uge 22 — RACEUGE · 15–27 sep", sub:"Spar kræfter!", days:[["Man","Hvile",""],["Tir","Let løbetur","4 km"],["Ons","Hvile",""],["Tor","Let joggetur + 3 strides","4 km"],["Fre","Hvile — pak tasken",""],["Lør","Kort løbetur 15 min rolig","2 km"],["Søn","🏁 HCA 30 km!","30 km"]] },
  ]},
];

const KEY = 'hca_30km_v2';
let state = (() => { try { return JSON.parse(localStorage.getItem(KEY)||'{}') } catch { return {} } })();
window._open = {};

function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
const isRest = d => d === 'Hvile' || d === 'Aktiv hvile';
const isRace = d => d.includes('HCA 30 km');
const countTrain = days => days.filter(d => !isRest(d[1])).length;

function render() {
  const container = document.getElementById('program');
  container.innerHTML = '';
  let total = 0, doneN = 0;

  PHASES.forEach((phase, pi) => {
    const group = document.createElement('div');
    group.className = 'phase-group';
    const lbl = document.createElement('p');
    lbl.className = 'phase-label';
    lbl.textContent = phase.label;
    group.appendChild(lbl);

    phase.weeks.forEach((week, wi) => {
      const wKey = `p${pi}w${wi}`;
      const trainN = countTrain(week.days);
      total += trainN;
      let wDone = 0;
      week.days.forEach((d, di) => { if (!isRest(d[1]) && state[`${wKey}d${di}`]) wDone++; });
      doneN += wDone;
      const pct = trainN > 0 ? wDone / trainN * 100 : 0;
      const isOpen = !!window._open[wKey];

      const card = document.createElement('div');
      card.className = 'week-card';
      card.innerHTML = `
        <div class="week-header" onclick="toggleWeek('${wKey}')">
          <div>
            <div class="week-name">${week.label}</div>
            <div class="week-meta">${week.sub} · ${wDone}/${trainN} dage</div>
          </div>
          <div class="week-right">
            <span class="badge ${phase.badge}">${phase.badgeText}</span>
            <span class="chevron${isOpen?' open':''}" id="ch-${wKey}">▾</span>
          </div>
        </div>
        <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
        <div class="week-body${isOpen?' open':''}" id="body-${wKey}"></div>`;

      const body = card.querySelector(`#body-${wKey}`);

      week.days.forEach((d, di) => {
        const [name, desc, km] = d;
        const rest = isRest(desc), race = isRace(desc);
        const dKey = `${wKey}d${di}`;
        const isDone = !!state[dKey];
        const img = state['img_' + dKey] || null;
        const note = state['note_' + dKey] || '';

        const row = document.createElement('div');
        row.className = `day-row${rest?' day-rest':''}${race?' day-race race-day':''}${isDone?' done':''}${!rest?' clickable':''}`;

        // Main tap row
        const main = document.createElement('div');
        main.className = 'day-main';
        if (!rest) main.onclick = () => toggleDay(dKey, wKey);
        main.innerHTML = `
          <div class="check">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="${race?'#0f0f0d':'var(--accent-text)'}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="day-info">
            <div class="day-name">${name}</div>
            <div class="day-desc">${desc}</div>
          </div>
          <div class="day-km">${km}</div>`;
        row.appendChild(main);

        // Photo section — only visible when done
        if (isDone) {
          const area = document.createElement('div');
          area.className = 'photo-area';

          if (img) {
            // Show image + note
            const thumb = document.createElement('div');
            thumb.className = 'photo-thumb';

            const imgEl = document.createElement('img');
            imgEl.src = img;
            imgEl.alt = 'Løbebillede';
            imgEl.onclick = () => openLightbox(dKey);
            thumb.appendChild(imgEl);

            const delBtn = document.createElement('button');
            delBtn.className = 'photo-delete';
            delBtn.textContent = '×';
            delBtn.onclick = (e) => { e.stopPropagation(); deletePhoto(dKey, wKey); };
            thumb.appendChild(delBtn);
            area.appendChild(thumb);

            const noteEl = document.createElement('textarea');
            noteEl.className = 'photo-note';
            noteEl.rows = 2;
            noteEl.placeholder = 'Skriv en note om turen...';
            noteEl.value = note;
            noteEl.oninput = (e) => { state['note_' + dKey] = e.target.value; save(); };
            noteEl.onclick = (e) => e.stopPropagation();
            area.appendChild(noteEl);
          } else {
            // Show add button
            const fileId = 'file-' + dKey;
            const btn = document.createElement('button');
            btn.className = 'add-photo-btn';
            btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Tilføj Strava billede`;
            btn.onclick = (e) => { e.stopPropagation(); document.getElementById(fileId).click(); };

            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.className = 'file-input';
            fileInput.id = fileId;
            fileInput.onchange = (e) => handlePhoto(e, dKey, wKey);

            area.appendChild(btn);
            area.appendChild(fileInput);
          }

          row.appendChild(area);
        }

        body.appendChild(row);
      });

      group.appendChild(card);
    });

    container.appendChild(group);
  });

  document.getElementById('done-count').textContent = `${doneN} / ${total}`;
  const pct = total > 0 ? Math.round(doneN / total * 100) : 0;
  document.getElementById('main-prog').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '% gennemført';
  const left = Math.ceil((new Date('2026-09-27') - new Date()) / 86400000);
  document.getElementById('days-left').textContent = left > 0 ? left : '🏁';
}

function toggleWeek(key) {
  window._open[key] = !window._open[key];
  render();
}

function toggleDay(key, weekKey) {
  state[key] = !state[key];
  if (!state[key]) { delete state['img_'+key]; delete state['note_'+key]; }
  save();
  window._open[weekKey] = true;
  render();
}

function handlePhoto(e, dKey, wKey) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 900;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      state['img_' + dKey] = canvas.toDataURL('image/jpeg', 0.78);
      save();
      window._open[wKey] = true;
      render();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function deletePhoto(dKey, wKey) {
  delete state['img_' + dKey];
  delete state['note_' + dKey];
  save();
  window._open[wKey] = true;
  render();
}

function openLightbox(dKey) {
  const img = state['img_' + dKey];
  if (!img) return;
  document.getElementById('lb-img').src = img;
  document.getElementById('lightbox').classList.add('show');
}

function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }
function showReset() { document.getElementById('overlay').classList.add('show'); }
function hideReset() { document.getElementById('overlay').classList.remove('show'); }
function doReset() { state = {}; save(); hideReset(); render(); }

render();
</script>
</body>
